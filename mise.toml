min_version = "2024.11.0"

[tools]
go = "1.26.3"
"go:golang.org/x/mobile/cmd/gomobile" = "0.0.0-20260529142300-ecb4cd65260a"
"go:golang.org/x/mobile/cmd/gobind" = "0.0.0-20260529142300-ecb4cd65260a"

[settings]
lockfile = true

[tasks.gomobile-init]
description = "One-time gomobile toolchain init (run before building TailnetCore)"
run = "./Scripts/gomobile-init.sh"

[tasks.build-xcframework]
description = "Build Vendor/TailnetCore.xcframework (legacy gomobile path)"
depends = ["gomobile-init"]
run = "./Scripts/build-xcframework.sh"

[tasks.build-carchive]
description = "Build Vendor/TailnetCore.xcframework from the c-archive C ABI"
run = "./Scripts/build-carchive-xcframework.sh"

[tasks.carchive-smoke]
description = "Standalone C probe of the c-archive boundary (needs network)"
run = "./Scripts/carchive-smoke.sh"

[tasks.test]
description = "Run Swift tests"
run = "swift test"

[tasks.smoke]
description = "Live tailnet Tier-1 smoke test (needs network)"
run = "TAILNET_INTEGRATION=1 swift test --filter testEmbeddedBackendReachesLogin"
