name: Release

# Manually triggered. Builds the xcframework, computes its checksum, writes both into
# Package.swift, commits + tags, and publishes the GitHub release with the asset — in that
# order, so the tagged manifest always matches the published binary.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 0.2.0)"
        required: true

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write # push the release commit + tag, create the release
      id-token: write # OIDC, to sign the provenance attestation
      attestations: write # record the build-provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: Go/go.mod

      - name: Build xcframework (all slices)
        run: ./Scripts/build-carchive-xcframework.sh

      - name: Zip and checksum
        id: artifact
        run: |
          set -euo pipefail
          ( cd Vendor && zip -rqy ../TailnetCore.xcframework.zip TailnetCore.xcframework )
          echo "checksum=$(swift package compute-checksum TailnetCore.xcframework.zip)" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: TailnetCore.xcframework.zip

      - name: Pin the release into Package.swift
        run: |
          set -euo pipefail
          V="${{ inputs.version }}"
          C="${{ steps.artifact.outputs.checksum }}"
          sed -i '' -E "s#releases/download/v[0-9]+\.[0-9]+\.[0-9]+/TailnetCore#releases/download/v${V}/TailnetCore#" Package.swift
          sed -i '' -E "s#checksum: \"[a-f0-9]{64}\"#checksum: \"${C}\"#" Package.swift
          git --no-pager diff Package.swift

      - name: Commit, tag, push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Release v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "TailnetKit v${{ inputs.version }}"
          git push origin HEAD:master
          git push origin "v${{ inputs.version }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" TailnetCore.xcframework.zip \
            --title "v${{ inputs.version }}" \
            --notes "Automated release. Bundled Tailscale and Go versions per Go/go.mod."
