version: 2
updates:
  # Keeps SHA-pinned GitHub Actions current (Dependabot updates the SHA + the version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Go module (tailscale.com and transitive deps).
  - package-ecosystem: gomod
    directory: /Go
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
